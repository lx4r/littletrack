<!doctype html>
<html lang="en">

<head>
  <!-- Applies saved theme preference before first paint to prevent a flash of light theme.
       Must be inline + synchronous (no defer/async) so it runs before the stylesheet renders.
       try/catch guards against localStorage throwing in private/incognito mode. -->
  <script>
    try {
      const localStoragePreference = localStorage.getItem("theme");
      const preferenceIsDark = localStoragePreference === "dark" || (localStoragePreference !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
      if (preferenceIsDark) {
        document.documentElement.classList.add("dark");
      }
    } catch (_) { }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LittleTrack</title>
  <meta name="description" content="Simple time tracking">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple_touch_icon.jpg">
  <meta name="theme-color" content="#262626">
</head>

<body class="font-sans">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
